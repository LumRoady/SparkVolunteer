name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spark-volunteer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -B

      - name: Run tests
        run: mvn test -B -Dspring.profiles.active=test

      - name: Package
        run: mvn package -DskipTests -B

      - name: Verify Docker build
        run: docker build -t spark-volunteer:ci .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: spark-volunteer/target/surefire-reports/

  security:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: spark-volunteer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: OWASP dependency check
        run: mvn org.owasp:dependency-check-maven:8.4.3:check -B
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: spark-volunteer/target/dependency-check-report.html
