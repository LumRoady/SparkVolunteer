# ================= 测试环境配置 =================
# H2 内存数据库 + 关闭 Flyway + 关闭 Redis

# H2 内存数据库（MySQL 兼容模式）
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - 测试环境自动建表
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# 关闭 Flyway（测试由 JPA 从 Entity 自动建表）
spring.flyway.enabled=false

# 关闭 Redis 自动配置（由 TestRedisConfig 提供 Mock Bean）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# 允许测试配置覆盖主 Bean
spring.main.allow-bean-definition-overriding=true

# JWT 测试密钥（至少 256 位）
jwt.secret=test-secret-key-for-unit-tests-at-least-256-bits-long-enough
jwt.expiration=3600000

# 日志
logging.level.com.spark.volunteer=DEBUG
