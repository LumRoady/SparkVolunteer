# ================= Server Configuration =================

server.port=${SERVER_PORT:8084}

# ================= Spring Profile Configuration =================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ================= Database Configuration =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# ================= JPA Configuration =================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ================= JWT Configuration =================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ================= Logging Configuration =================
logging.level.com.spark.volunteer=INFO
logging.file.name=logs/volunteer.log

# ================= Redis Configuration =================
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DATABASE:0}
spring.redis.timeout=3000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# ================= Wechat Configuration =================
# 微信公众号/小程序AppID和Secret（用于发送模板消息通知家属）
wechat.appid=${WECHAT_APPID:}
wechat.secret=${WECHAT_SECRET:}
wechat.template_id=${WECHAT_TEMPLATE_ID:}

# ================= Actuator Monitoring =================
# 默认暴露端点（各Profile可覆盖）
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,redis

# ================= Project Information =================
project.name=Spark Volunteer Platform
project.version=1.0.0

# ================= Flyway Configuration =================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1.1
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8