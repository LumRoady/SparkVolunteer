# ================= 开发环境配置 =================
# 使用 MySQL 数据库，启动前确保 MySQL 服务已运行且已创建 volunteer_db

# Server
server.port=8084

# Database - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA - none 模式（列已由旧版 update 创建好，跳过校验避免类型不匹配）
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Logging - Debug level for development
logging.level.com.spark.volunteer=DEBUG

# Redis - 本地开发环境
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.pubsub.enabled=true

# JWT - 开发环境密钥（生产环境必须通过环境变量注入强密钥）
jwt.secret=spark-volunteer-dev-secret-key-2026

# Springdoc - 开发环境启用 Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Flyway - 开发环境禁用（数据库列已由旧版 ddl-auto=update 创建，JPA validate 负责校验）
spring.flyway.enabled=false

# Actuator - 开发环境暴露所有端点
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
# 开启 Redis 健康检查（由 EmbeddedRedisHealthIndicator ping方式接管，避免 Windows 路径解析问题）
management.health.redis.enabled=true
# 就绪探针使用自定义的 embeddedRedis 健康检查（替代默认的 INFO 命令方式）
management.endpoint.health.group.readiness.include=readinessState,db,embeddedRedis
