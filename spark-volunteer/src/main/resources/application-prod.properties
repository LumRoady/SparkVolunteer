# ================= Production Environment Configuration =================

# Server
server.port=${SERVER_PORT:8084}

# Database - Production (Use environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA - Disable SQL show in production
spring.jpa.show-sql=false

# Logging - Warn level for production
logging.level.com.spark.volunteer=WARN

# Redis - Production (Use environment variables)
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.database=0
spring.redis.pubsub.enabled=${REDIS_PUBSUB_ENABLED:true}

# 生产环境必须通过环境变量设置JWT密钥（至少256位随机字符串）
jwt.secret=${JWT_SECRET}

# Knife4j - 生产环境禁用API文档
knife4j.enable=false
